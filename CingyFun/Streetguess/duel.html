<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Online Duel | StreetGuess</title>
  <link rel="icon" href="../../assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/game.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>

<body class="game-body">
  <div id="pano"></div>
  <div class="game-shade"></div>

  <header class="game-hud duel-hud" aria-label="Duel HUD">
    <div class="hud-left">
      <section class="hp-card">
        <div class="hp-top"><strong id="player1-name">Player 1</strong><span><span id="player1-hp">6000</span> HP</span></div>
        <div class="hp-bar"><div class="hp-fill" id="player1-fill"></div></div>
      </section>
    </div>
    <div class="hud-center">
      <div class="hud-pill"><span>Round</span><strong id="round">0</strong></div>
      <div class="hud-pill"><span>Damage</span><strong id="multiplier">1x</strong></div>
      <div class="hud-pill timer-pill" id="timer">ONLINE</div>
      <button class="btn secondary audio-toggle" data-audio-toggle type="button" aria-pressed="false">Sound On</button>
    </div>
    <div class="hud-right">
      <section class="hp-card">
        <div class="hp-top"><strong id="player2-name">Player 2</strong><span><span id="player2-hp">6000</span> HP</span></div>
        <div class="hp-bar"><div class="hp-fill" id="player2-fill"></div></div>
      </section>
    </div>
  </header>

  <div id="guess-map-panel">
    <div id="guess-map"></div>
    <button class="map-expand-button" data-map-expand type="button" aria-label="Open full guess map">
      Open full map
    </button>
    <button class="map-close-button" data-map-close type="button" aria-label="Close full guess map">Close</button>
    <div class="map-actions">
      <button id="duel-guess-btn" class="btn" type="button" disabled>Guess</button>
      <button id="reset-pin-btn" class="btn secondary" type="button">Reset Pin</button>
    </div>
  </div>

  <div class="duel-status" id="duel-status">Connecting online room...</div>
  <a class="btn secondary game-back" href="duel-lobby.html">Back</a>

  <script src="../../js/config.js"></script>
  <script src="../../js/google-loader.js"></script>
  <script src="../../js/locations.js"></script>
  <script src="../../js/storage.js"></script>
  <script src="../../js/audio.js"></script>
  <script src="../../js/timer.js"></script>
  <script src="../../js/scoring.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/profile-stats.js"></script>
  <script src="../../js/maps.js"></script>
  <script src="../../js/streetview.js"></script>
  <script src="../../js/duel.js"></script>
</body>

</html>
