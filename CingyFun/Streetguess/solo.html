<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solo | StreetGuess</title>
  <link rel="icon" href="../../assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/game.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>

<body class="game-body">
  <div id="pano"></div>
  <div class="game-shade"></div>

  <header class="game-hud" aria-label="Solo HUD">
    <div class="hud-left">
      <div class="hud-pill"><span>Round</span><strong id="round">0</strong></div>
      <div class="hud-pill"><span>Score</span><strong id="score">0</strong></div>
      <div class="hud-pill"><span>Streak</span><strong id="streak">0</strong></div>
    </div>
    <div class="hud-center">
      <div class="hud-pill timer-pill" id="timer">03:00</div>
    </div>
    <div class="hud-right">
      <button class="btn secondary" id="give-up-btn" type="button">Give Up</button>
    </div>
  </header>

  <aside class="hint-panel">
    <p>Look for signs, languages, road lines, plates, flags, domains, architecture and landscape.</p>
  </aside>

  <div id="guess-map-panel">
    <div id="guess-map"></div>
    <div class="map-actions">
      <button id="guess-btn" class="btn" type="button" disabled>Guess</button>
      <button id="reset-pin-btn" class="btn secondary" type="button">Reset Pin</button>
    </div>
  </div>

  <a class="btn secondary game-back" href="index.html">Back</a>

  <script src="../../js/config.js"></script>
  <script src="../../js/google-loader.js"></script>
  <script src="../../js/locations.js"></script>
  <script src="../../js/storage.js"></script>
  <script src="../../js/audio.js"></script>
  <script src="../../js/timer.js"></script>
  <script src="../../js/scoring.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/maps.js"></script>
  <script src="../../js/streetview.js"></script>
  <script src="../../js/solo.js"></script>
</body>

</html>
