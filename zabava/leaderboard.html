<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaderboard | StreetGuess</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html"><img src="../assets/logo.svg" alt="">StreetGuess</a>
      <button class="nav-toggle" id="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
      <nav class="nav" id="site-nav" aria-label="Game navigation">
        <a href="index.html">Play</a>
        <a href="solo.html">Solo</a>
        <a href="duel-lobby.html">Online Duel</a>
        <a href="rules.html">Rules</a>
        <a class="active" href="leaderboard.html">Leaderboard</a>
        <a href="settings.html">Settings</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <div class="container">
      <div class="section-heading">
        <p class="eyebrow">Local leaderboard</p>
        <h1>Your best StreetGuess runs.</h1>
        <p class="lead">Scores are stored locally in this browser with localStorage.</p>
      </div>

      <section class="panel card">
        <div class="tab-row">
          <button class="tab-btn active" data-leaderboard-tab="Solo" type="button">Solo Streaks</button>
          <button class="tab-btn" data-leaderboard-tab="Duel" type="button">Duel Wins</button>
          <button class="tab-btn" data-leaderboard-tab="Accuracy" type="button">Best Accuracy</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Mode</th>
                <th>Score</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
          </table>
        </div>
        <div class="button-row" style="margin-top: 18px;">
          <button class="btn danger" id="clear-leaderboard-btn" type="button">Clear Local Leaderboard</button>
        </div>
      </section>
    </div>
  </main>

  <script src="../js/storage.js"></script>
  <script src="../js/timer.js"></script>
  <script src="../js/scoring.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/app.js"></script>
</body>

</html>
