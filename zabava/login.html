<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | StreetGuess</title>
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html"><img src="../assets/logo.svg" alt="">StreetGuess</a>
      <button class="nav-toggle" id="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
      <nav class="nav" id="site-nav" aria-label="Game navigation">
        <a href="index.html">Play</a>
        <a href="solo.html">Solo</a>
        <a href="duel-lobby.html">Online Duel</a>
        <a href="rules.html">Rules</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="settings.html">Settings</a>
        <a class="active" href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <div class="container split-grid">
      <section>
        <p class="eyebrow">Zabava account</p>
        <h1>One login for StreetGuess and future games.</h1>
        <p class="lead">This account is only for the games inside `/Zabava`. Production accounts are managed by Netlify Identity, separate from the rest of Cingy.Tech.</p>
      </section>

      <aside class="panel card form-grid">
        <div id="auth-current" class="hidden"></div>

        <form id="login-form" class="form-grid">
          <h2>Log in</h2>
          <div class="field">
            <label for="login-email">Email</label>
            <input class="input" id="login-email" name="email" type="email" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input class="input" id="login-password" name="password" type="password" autocomplete="current-password" required>
          </div>
          <button class="btn" type="submit">Log In</button>
        </form>

        <form id="signup-form" class="form-grid">
          <h2>Create account</h2>
          <div class="field">
            <label for="signup-name">Player name</label>
            <input class="input" id="signup-name" name="name" autocomplete="nickname" required>
          </div>
          <div class="field">
            <label for="signup-email">Email</label>
            <input class="input" id="signup-email" name="email" type="email" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="signup-password">Password</label>
            <input class="input" id="signup-password" name="password" type="password" autocomplete="new-password" minlength="8" required>
          </div>
          <button class="btn secondary" type="submit">Create Account</button>
        </form>

        <p class="muted" id="auth-note"></p>
      </aside>
    </div>
  </main>

  <script src="../js/storage.js"></script>
  <script src="../js/timer.js"></script>
  <script src="../js/scoring.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/login.js"></script>
</body>

</html>
