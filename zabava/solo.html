<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solo Country Streak | WorldGuess</title>
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/game.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="game-body" data-page="solo">
  <main class="game-screen">
    <div class="game-topbar">
      <div class="hud-chip"><span>Timer</span><strong id="timer">03:00</strong></div>
      <div class="hud-chip"><span>Round</span><strong id="round">1</strong></div>
      <div class="hud-chip"><span>Streak</span><strong id="streak">0</strong></div>
      <div class="hud-chip"><span>Score</span><strong id="score">0</strong></div>
    </div>
    <section class="panorama-wrap">
      <div id="panorama" class="panorama-shell"></div>
      <aside class="guess-dock glass">
        <div id="guess-map"></div>
        <select id="country-select" class="select"></select>
        <div class="guess-actions">
          <button id="guess-btn" class="btn" disabled>Guess</button>
          <button id="reset-btn" class="btn-ghost">Reset Pin</button>
          <button id="giveup-btn" class="btn-danger">Give Up</button>
        </div>
        <div class="hint-panel">Look for signs, language, road lines, flags, domains, plates, landscape and driving side.</div>
      </aside>
    </section>
  </main>
  <script src="../js/data.js"></script><script src="../js/storage.js"></script><script src="../js/timer.js"></script><script src="../js/scoring.js"></script><script src="../js/ui.js"></script><script src="../js/api.js"></script><script src="../js/map.js"></script><script src="../js/app.js"></script><script src="../js/solo.js"></script>
</body>
</html>
