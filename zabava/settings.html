<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings | WorldGuess</title>
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/game.css"><link rel="stylesheet" href="../css/responsive.css">
</head>
<body data-page="settings">
  <div class="shell">
    <header class="site-header"><div class="container nav-wrap"><a class="brand" href="index.html"><img src="../assets/logo.svg" alt="">WorldGuess</a><button class="nav-toggle" data-nav-toggle>☰</button><nav class="nav" data-nav><a href="index.html">Play</a><a href="solo.html">Solo</a><a href="duel-lobby.html">Duel</a><a href="leaderboard.html">Leaderboard</a><a href="rules.html">Rules</a><a class="active" href="settings.html">Settings</a></nav></div></header>
    <main class="section"><div class="container"><p class="eyebrow">Settings</p><h1>Tune the run.</h1><form id="settings-form" class="panel form-grid" style="margin-top:24px">
      <label>Theme<select name="theme" class="select"><option>dark</option><option>light</option><option>system</option></select></label>
      <label>Units<select name="units" class="select"><option>kilometers</option><option>miles</option></select></label>
      <label>Map style<select name="mapStyle" class="select"><option>dark</option><option>satellite</option><option>minimal</option></select></label>
      <label><input type="checkbox" name="sound"> Sound</label><label><input type="checkbox" name="timerSounds"> Timer sounds</label><label><input type="checkbox" name="allowMoving"> Allow moving</label><label><input type="checkbox" name="allowZoom"> Allow zoom</label><label><input type="checkbox" name="allowPan"> Allow pan</label>
      <div class="actions"><button class="btn">Save settings</button><button type="button" class="btn-danger" data-clear-data>Reset all data</button></div>
    </form></div></main>
  </div>
  <script src="../js/data.js"></script><script src="../js/storage.js"></script><script src="../js/timer.js"></script><script src="../js/scoring.js"></script><script src="../js/ui.js"></script><script src="../js/api.js"></script><script src="../js/map.js"></script><script src="../js/app.js"></script>
</body>
</html>
